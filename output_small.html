<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DNA Sequence Matcher</title>
<style>
body { font-family: Arial, sans-serif; margin: 24px; color: #222; }
h1 { margin-bottom: 16px; }
.summary { border-collapse: collapse; margin-bottom: 24px; }
.summary td { padding: 6px 12px; border-bottom: 1px solid #e5e5e5; }
.summary td:first-child { font-weight: 700; }
.match-block { margin-top: 16px; }
.sequence-label { font-weight: 700; margin: 12px 0 6px; }
.sequence-row { font-family: 'Courier New', monospace; font-size: 28px; line-height: 1; white-space: nowrap; }
.base { display: inline-flex; width: 34px; height: 34px; align-items: center; justify-content: center; margin-right: 2px; font-weight: 700; }
.chunk { margin-bottom: 10px; }
</style>
</head>
<body>
<table class="summary">
<tr><td>minimum length</td><td>3</td></tr><tr><td>stop on first</td><td>false</td></tr><tr><td>matches found</td><td>1</td></tr>
</table>
<div class="match-block">
<div class="match-block"><div class="sequence-label">seq1</div><div class="sequence-row chunk"><span class="base" style="background:#f4c20d">A</span><span class="base" style="background:#ea4335">T</span><span class="base" style="background:#34a853">G</span><span class="base" style="background:#4285f4">C</span></div><div class="sequence-label">seq2</div><div class="sequence-row chunk"><span class="base" style="background:#f4c20d">A</span><span class="base" style="background:#ea4335">T</span><span class="base" style="background:#34a853">G</span><span class="base" style="background:#4285f4">C</span></div></div>
</div>
</body>
</html>
